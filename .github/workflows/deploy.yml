name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.1'
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Build web
        run: flutter build web --release --dart-define=APP_ENV=prod --base-href /SegurAppRSAS/

      - name: Deploy to SegurAppRSAS
        run: |
          git clone https://x-access-token:${{ secrets.DEPLOY_TOKEN }}@github.com/javierrueda7/SegurAppRSAS.git deploy_repo
          cp -r build/web/. deploy_repo/
          cd deploy_repo
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Deploy: ${{ github.sha }}"
          git push
